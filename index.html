<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Flappy Birds</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;overflow:hidden;background:#0a0010;}
  body{display:flex;align-items:center;justify-content:center;font-family:'Press Start 2P',monospace;}
  canvas{display:block;position:absolute;top:0;left:0;width:100%;height:100%;image-rendering:pixelated;image-rendering:crisp-edges;cursor:pointer;}
  #ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;display:flex;align-items:center;justify-content:center;z-index:10;}
  .screen{display:none;flex-direction:column;align-items:center;justify-content:center;gap:0;pointer-events:all;text-align:center;}
  .screen.active{display:flex;}
  #startScreen,#gameoverScreen{background:rgba(10,0,20,0.92);border:3px solid #e8a0b4;padding:32px 40px;box-shadow:0 0 0 6px #0a0010,0 0 0 9px #9b8ec4,0 0 40px rgba(232,160,180,0.3);border-radius:2px;max-height:95vh;overflow-y:auto;}
  .game-title{font-family:'Press Start 2P',monospace;font-size:18px;color:#e8a0b4;text-shadow:3px 3px 0 #7a3050,6px 6px 0 #3a0028;letter-spacing:1px;line-height:1.8;margin-bottom:20px;}
  .game-subtitle{font-family:'Press Start 2P',monospace;font-size:8px;color:#9b8ec4;margin-bottom:28px;letter-spacing:1px;line-height:1.6;}
  .score-display{font-family:'Press Start 2P',monospace;font-size:8px;color:#c9a96e;margin-bottom:22px;line-height:2;}
  .start-btn{font-family:'Press Start 2P',monospace;font-size:9px;color:#0a0010;background:#e8a0b4;border:none;padding:12px 24px;cursor:pointer;letter-spacing:1px;box-shadow:4px 4px 0 #7a3050;transition:all .08s;outline:none;margin-top:8px;}
  .start-btn:hover{background:#f0c0d0;transform:translate(-1px,-1px);box-shadow:5px 5px 0 #7a3050;}
  .start-btn:active{transform:translate(2px,2px);box-shadow:2px 2px 0 #7a3050;}
  .social-container{display:flex;gap:12px;margin-top:14px;}
  .share-btn{font-family:'Press Start 2P',monospace;font-size:7px;color:#fff;background:#000;border:1px solid #6a6480;padding:10px 16px;cursor:pointer;box-shadow:3px 3px 0 #3a2050;outline:none;transition:all .08s;}
  .share-btn:hover{background:#111;transform:translate(-1px,-1px);box-shadow:4px 4px 0 #3a2050;}
  .share-btn:active{transform:translate(1px,1px);box-shadow:2px 2px 0 #3a2050;}
  .hint-text{font-family:'Press Start 2P',monospace;font-size:7px;color:#6a6480;margin-top:18px;line-height:2;animation:blink 1.2s step-end infinite;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
  .new-record{font-family:'Press Start 2P',monospace;font-size:8px;color:#c9a96e;text-shadow:2px 2px 0 #8b6a30;animation:blink 0.8s step-end infinite;margin-bottom:12px;}
  #liveScore{position:absolute;top:24px;left:50%;transform:translateX(-50%);font-family:'Press Start 2P',monospace;font-size:14px;color:#fff;text-shadow:2px 2px 0 #000;pointer-events:none;display:none;text-align:center;line-height:2;}
  #weatherAlert{font-size:9px;color:#fff;text-shadow:2px 2px 0 #000;margin-top:4px;letter-spacing:1px;animation:blink 0.5s step-end 6;}
  #leaderboard{margin-top:16px;width:280px;max-height:220px;overflow-y:auto;border:2px solid #3a2050;background:#0d0118;}
  #leaderboard::-webkit-scrollbar{width:4px;}
  #leaderboard::-webkit-scrollbar-track{background:#0a0010;}
  #leaderboard::-webkit-scrollbar-thumb{background:#9b8ec4;}
  .lb-title{font-family:'Press Start 2P',monospace;font-size:7px;color:#9b8ec4;padding:8px;border-bottom:1px solid #3a2050;letter-spacing:1px;}
  .lb-row{display:flex;justify-content:space-between;align-items:center;padding:5px 8px;border-bottom:1px solid #1a0828;font-family:'Press Start 2P',monospace;font-size:6px;}
  .lb-row.me{background:#1a0828;color:#e8a0b4;}
  .lb-rank{color:#6a6480;width:20px;flex-shrink:0;}
  .lb-name{color:#c9a96e;flex:1;text-align:left;padding:0 6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .lb-score{color:#6ec4b0;width:40px;text-align:right;flex-shrink:0;}
  .lb-loading{font-family:'Press Start 2P',monospace;font-size:7px;color:#6a6480;padding:16px;text-align:center;}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="ui">
  <div class="screen active" id="startScreen">
    <div class="game-title">FLAPPY BIRDS</div>
    <div class="game-subtitle">created by @ABDXBT<br/>for @thebeaksart</div>
    <div class="score-display" id="startHiScore">HI-SCORE: 0</div>

  <div class="screen" id="gameoverScreen">
    <div class="game-title" style="font-size:16px;margin-bottom:16px;">GAME OVER</div>

      <button class="share-btn" id="xShareBtn">𝕏 SHARE SCORE</button>

    </div>
    <div class="hint-text" id="statusHint">SPACE TO RETRY</div>
  </div>
  <div id="liveScore">
    <span id="hudScore">0</span><br/>
    <span style="font-size:8px;color:#c9a96e;" id="hudHi">BEST: 0</span>
    <div id="weatherAlert" style="display:none;"></div>
  </div>
</div>
<script>
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
ctx.imageSmoothingEnabled=false;
let W,H;

function resize(){
  W=window.innerWidth;
  H=window.innerHeight;
  canvas.width=W;
  canvas.height=H;
}
resize();
window.addEventListener('resize',resize);

function px(x,y,w,h,color){ctx.fillStyle=color;ctx.fillRect(Math.round(x),Math.round(y),w,h);}

// --- WEB AUDIO API ENGINE ---
const AudioEngine = {
  ctx: null,
  musicInterval: null,
  init() {
    if (!this.ctx) {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    }
  },
  playFlap() {
    this.init(); const osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
    osc.type = 'triangle'; osc.frequency.setValueAtTime(140, this.ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(320, this.ctx.currentTime + 0.12);
    gain.gain.setValueAtTime(0.25, this.ctx.currentTime); gain.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.12);
    osc.connect(gain); gain.connect(this.ctx.destination); osc.start(); osc.stop(this.ctx.currentTime + 0.12);
  },
  playCoin() {
    this.init(); const osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
    osc.type = 'sine'; osc.frequency.setValueAtTime(587.33, this.ctx.currentTime);
    osc.frequency.setValueAtTime(880, this.ctx.currentTime + 0.08);
    gain.gain.setValueAtTime(0.2, this.ctx.currentTime); gain.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.25);
    osc.connect(gain); gain.connect(this.ctx.destination); osc.start(); osc.stop(this.ctx.currentTime + 0.25);
  },
  playScore() {
    this.init(); const osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
    osc.type = 'square'; osc.frequency.setValueAtTime(440, this.ctx.currentTime);
    osc.frequency.setValueAtTime(659.25, this.ctx.currentTime + 0.06);
    gain.gain.setValueAtTime(0.15, this.ctx.currentTime); gain.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.18);
    osc.connect(gain); gain.connect(this.ctx.destination); osc.start(); osc.stop(this.ctx.currentTime + 0.18);
  },
  playHit() {
    this.init(); const osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(120, this.ctx.currentTime);
    osc.frequency.linearRampToValueAtTime(40, this.ctx.currentTime + 0.25);
    gain.gain.setValueAtTime(0.3, this.ctx.currentTime); gain.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.25);
    osc.connect(gain); gain.connect(this.ctx.destination); osc.start(); osc.stop(this.ctx.currentTime + 0.25);
  },
  startMusic() {
    this.init(); this.stopMusic();
    let tempo = 135, beat = 60 / tempo, index = 0;
    const melody = [293.66, 329.63, 349.23, 392.00, 440.00, 392.00, 349.23, 329.63, 261.63, 293.66, 329.63, 349.23, 293.66, 0, 440.00, 392.00];
    this.musicInterval = setInterval(() => {
      if (state !== STATE.PLAYING) return;
      let freq = melody[index % melody.length];
      if (freq > 0) {
        const osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
        osc.type = 'triangle'; osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
        gain.gain.setValueAtTime(0.06, this.ctx.currentTime); gain.gain.linearRampToValueAtTime(0.001, this.ctx.currentTime + beat * 0.9);
        osc.connect(gain); gain.connect(this.ctx.destination); osc.start(); osc.stop(this.ctx.currentTime + beat * 0.9);
      }
      index++;
    }, beat * 1000);
  },
  stopMusic() { if (this.musicInterval) clearInterval(this.musicInterval); }
};

const STATE={START:0,PLAYING:1,DEAD:2};
const WEATHER={SUNNY:0,RAINY:1,THUNDERSTORM:2,SNOWING:3};

// --- SUPABASE CONFIG ---
const SUPABASE_URL = 'https://jfvxhredhnsuggvigeuh.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpmdnhocmVkaG5zdWdndmlnZXVoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwMDkzMjAsImV4cCI6MjA5NDU4NTMyMH0.PUv68bG0FQdlRfQr4HKdD5NCQsEb6RSSMX1IaMAjQAs';

async function sbFetch(path, opts={}){
  const res = await fetch(SUPABASE_URL + path, {
    ...opts,
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', ...(opts.headers||{}) }
  });
  const text = await res.text();
  if(!text) return null;
  const data = JSON.parse(text);
  if(!res.ok) throw new Error(JSON.stringify(data));
  return data;
}

async function submitScore(name, score){
  // fetch existing best for this player
  const existing = await sbFetch(`/rest/v1/scores?select=id,score&name=eq.${encodeURIComponent(name)}&order=score.desc&limit=1`);
  if(existing && existing.length > 0){
    if(score <= existing[0].score) return; // not a new best, skip
    // update existing record with new best
    await sbFetch(`/rest/v1/scores?id=eq.${existing[0].id}`, {
      method: 'PATCH',
      body: JSON.stringify({score}),
      headers: {'Prefer':'return=minimal'}
    });
  } else {
    // first time player — insert
    await sbFetch('/rest/v1/scores', {
      method: 'POST',
      body: JSON.stringify({name, score}),
      headers: {'Prefer':'return=minimal'}
    });
  }
}

async function fetchLeaderboard(){
  return sbFetch('/rest/v1/scores?select=name,score&order=score.desc&limit=50');
}

// --- PLAYER NAME ---
let playerName = localStorage.getItem('beaks_flap_name') || '';

function promptPlayerName(){
  return new Promise(resolve => {
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(10,0,20,0.97);display:flex;align-items:center;justify-content:center;z-index:999;';
    overlay.innerHTML = `
      <div style="text-align:center;padding:32px;border:3px solid #e8a0b4;background:#0a0010;box-shadow:0 0 0 6px #0a0010,0 0 0 9px #9b8ec4;">
        <div style="font-family:'Press Start 2P',monospace;font-size:13px;color:#e8a0b4;margin-bottom:24px;line-height:1.8;">ENTER YOUR NAME<br/><span style="font-size:8px;color:#9b8ec4;">OR X HANDLE</span></div>
        <input id="nameInput" maxlength="20" placeholder="@yourname" style="font-family:'Press Start 2P',monospace;font-size:10px;background:#1a0828;color:#fff;border:2px solid #9b8ec4;padding:10px 14px;outline:none;width:220px;text-align:center;"/>
        <br/><br/>
        <button id="nameBtn" style="font-family:'Press Start 2P',monospace;font-size:9px;color:#0a0010;background:#e8a0b4;border:none;padding:12px 24px;cursor:pointer;box-shadow:4px 4px 0 #7a3050;">▶ PLAY</button>
      </div>`;
    document.body.appendChild(overlay);
    const input = overlay.querySelector('#nameInput');
    const btn = overlay.querySelector('#nameBtn');
    input.focus();
    const confirm = () => {
      const val = input.value.trim();
      if(!val) return;
      playerName = val;
      localStorage.setItem('beaks_flap_name', playerName);
      document.body.removeChild(overlay);
      resolve();
    };
    btn.addEventListener('click', confirm);
    input.addEventListener('keydown', e => { if(e.key==='Enter') confirm(); });
  });
}

let state=STATE.START,score=0,hiScore=parseInt(localStorage.getItem('beaks_flap_hi')||'0'),frame=0;
let currentWeather=WEATHER.SUNNY;
let weatherParticles=[];
let lightningFlash=0;

const BIRD={
  x:120,y:200,vy:0,gravity:0.27,flapPower:-5.8,
  width:52,height:46,angle:0,wingFrame:0,wingTimer:0,
  dead:false,deathTimer:0,hitWater:false,
  reset(){this.y=H*0.4;this.vy=0;this.angle=0;this.dead=false;this.deathTimer=0;this.wingFrame=0;this.wingTimer=0;this.hitWater=false;},
  flap(){if(this.dead)return;this.vy = this.flapPower * 0.95;this.wingFrame=1;this.wingTimer=8;AudioEngine.playFlap();},
  update(){
    if(this.dead){
      this.deathTimer++;
      if(this.hitWater){
        // frozen at water surface — no further movement
        return;
      }
      this.vy+=this.gravity*1.5;this.y+=this.vy;
      return;
    }
    this.vy+=this.gravity;this.y+=this.vy;
    this.angle=Math.min(Math.PI/4,Math.max(-Math.PI/5,this.vy*0.06));
    this.wingTimer--;if(this.wingTimer<=0)this.wingFrame=0;
    if(this.y<-60)this.y=-60;
  },
  draw(){
    ctx.save();
    ctx.translate(this.x+this.width/2,this.y+this.height/2);
    ctx.rotate(this.angle);
    const ox=-this.width/2,oy=-this.height/2;
    const wf=this.wingFrame;
    px(ox+8,oy+14,30,20,'#3d2a5c');px(ox+6,oy+16,32,16,'#4a3568');
    px(ox+10,oy+12,26,22,'#3d2a5c');px(ox+8,oy+10,28,4,'#4a3568');
    px(ox+10,oy+32,24,4,'#2a1838');
    px(ox+14,oy+18,2,2,'#5a4080');px(ox+18,oy+16,2,2,'#5a4080');
    px(ox+22,oy+20,2,2,'#2a1838');px(ox+26,oy+22,2,2,'#2a1838');
    if(wf===1){
      px(ox+8,oy+6,22,6,'#9b8ec4');px(ox+10,oy+2,18,6,'#7a6a9c');px(ox+12,oy-2,12,6,'#9b8ec4');
    }else{
      px(ox+8,oy+26,22,8,'#9b8ec4');px(ox+10,oy+32,18,6,'#7a6a9c');px(ox+12,oy+36,12,4,'#9b8ec4');
    }
    px(ox+8,oy+20,30,14,'#3a2050');
    for(let s=0;s<5;s++)px(ox+10+s*5,oy+20,2,14,'#1a0828');
    px(ox+18,oy+18,10,4,'#f0c0d0');px(ox+20,oy+14,6,6,'#f0c0d0');
    px(ox+22,oy+12,4,4,'#e8a0b4');px(ox+20,oy+20,8,2,'#f0d0e0');
    px(ox+18,oy+22,4,2,'#d090a8');px(ox+28,oy+22,4,2,'#d090a8');
    px(ox+18,oy+6,18,16,'#4a3568');px(ox+20,oy+4,14,18,'#4a3568');
    px(ox+22,oy+2,10,20,'#3d2a5c');px(ox+24,oy+6,4,4,'#5a4080');
    px(ox+12,oy+10,6,10,'#d8d0e0');px(ox+36,oy+10,6,10,'#d8d0e0');
    px(ox+10,oy+12,4,6,'#c0b8d0');px(ox+40,oy+12,4,6,'#c0b8d0');
    px(ox+16,oy+8,20,4,'#d8d0e0');px(ox+18,oy+6,16,4,'#e0d8f0');
    px(ox+12,oy+14,2,2,'#b8b0c8');px(ox+40,oy+14,2,2,'#b8b0c8');
    px(ox+10,oy+16,2,2,'#b8b0c8');px(ox+42,oy+16,2,2,'#b8b0c8');
    px(ox+4,oy+10,42,4,'#5a3870');px(ox+6,oy+8,38,4,'#6a4880');px(ox+2,oy+12,46,2,'#3a2050');
    px(ox+14,oy+2,22,10,'#5a3870');px(ox+16,oy+0,18,4,'#6a4880');px(ox+14,oy+4,22,4,'#4a2860');
    px(ox+14,oy+10,22,2,'#e8a0b4');
    px(ox+18,oy-4,2,8,'#e8a0b4');px(ox+22,oy-6,2,10,'#9b8ec4');
    px(ox+26,oy-4,2,8,'#e8a0b4');px(ox+30,oy-2,2,6,'#c084a0');
    px(ox+20,oy-8,2,4,'#f0c0d0');px(ox+24,oy-10,2,6,'#9b8ec4');
    px(ox+16,oy-2,2,4,'#c9a96e');
    px(ox+34,oy+14,16,6,'#e8844a');px(ox+36,oy+12,14,8,'#e8844a');
    px(ox+38,oy+10,12,10,'#d07030');
    px(ox+38,oy+20,12,4,'#e8a0b4');px(ox+36,oy+18,14,4,'#c07890');
    px(ox+46,oy+12,6,12,'#3a1828');px(ox+48,oy+14,4,8,'#1a0810');
    px(ox+36,oy+12,4,2,'#f0a870');px(ox+34,oy+20,10,3,'#c06030');
    px(ox+26,oy+10,6,6,'#000000');px(ox+27,oy+11,4,4,'#ffffff');
    px(ox+28,oy+12,2,2,'#000000');px(ox+27,oy+11,1,1,'#e8a0b4');
    ctx.restore();
  }
};

const BG={
  skyThemes:{
    [WEATHER.SUNNY]: ['#1a0628','#3a1050','#6a2870','#c05080','#e87060','#f0a858'],
    [WEATHER.RAINY]: ['#0d0418','#1a0c2a','#2d1b40','#442f56','#5b466d','#725d84'],
    [WEATHER.THUNDERSTORM]: ['#05010a','#0e051a','#180d2b','#24163a','#31214a','#3f2d59'],
    [WEATHER.SNOWING]: ['#0b1426','#16233b','#263754','#3c5075','#596d96','#7c92bd']
  },
  stars:[],clouds:[],water:{x:0},
  init(){
    this.stars=[];
    for(let i=0;i<120;i++)this.stars.push({x:Math.random()*W,y:Math.random()*H*0.6,size:Math.random()<0.3?2:1,twinkle:Math.random()*30|0});
    this.clouds=[];
    for(let i=0;i<9;i++)this.clouds.push({x:Math.random()*W,y:30+Math.random()*120,speed:0.3+Math.random()*0.3,w:50+Math.random()*80|0});
  },
  update(speed){
    this.water.x=(this.water.x+speed*0.8)%16;
    this.clouds.forEach(c=>{c.x-=c.speed*(speed/3);if(c.x+c.w<0)c.x=W+20;});
  },
  drawSky(){
    if (lightningFlash > 0) {
      ctx.fillStyle = `rgba(220, 230, 255, ${lightningFlash * 0.15})`;
      ctx.fillRect(0,0,W,H);
      return;
    }
    const colors=this.skyThemes[currentWeather];
    const bands=colors.length;
    const bandH=(H*0.75)/(bands-1);
    for(let b=0;b<bands-1;b++){
      const c1=colors[b],c2=colors[b+1];
      const y0=b*bandH,y1=(b+1)*bandH;
      for(let y=Math.floor(y0);y<Math.floor(y1);y++){
        const t=(y-y0)/(y1-y0);
        const r1=parseInt(c1.slice(1,3),16),g1=parseInt(c1.slice(3,5),16),bl1=parseInt(c1.slice(5,7),16);
        const r2=parseInt(c2.slice(1,3),16),g2=parseInt(c2.slice(3,5),16),bl2=parseInt(c2.slice(5,7),16);
        ctx.fillStyle=`rgb(${Math.round(r1+(r2-r1)*t)},${Math.round(g1+(g2-g1)*t)},${Math.round(bl1+(bl2-bl1)*t)})`;
        ctx.fillRect(0,y,W,1);
      }
    }
  },
  drawStars(){
    if(currentWeather === WEATHER.RAINY || currentWeather === WEATHER.THUNDERSTORM) return;
    this.stars.forEach(s=>{
      if((frame+s.twinkle)%40>=32)return;
      ctx.fillStyle='#f0e8d8';ctx.fillRect(Math.round(s.x),Math.round(s.y),s.size,s.size);
    });
  },
  drawSun(){
    if(currentWeather !== WEATHER.SUNNY) return;
    const sx=W*0.85,sy=H*0.2;
    for(let dy=-16;dy<=16;dy+=2){
      for(let dx=-16;dx<=16;dx+=2){
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<=16){ctx.fillStyle=d<10?'#f0d070':d<13?'#e8a050':'#c07040';ctx.fillRect(sx+dx,sy+dy,2,2);}
      }
    }
  },
  drawClouds(){
    this.clouds.forEach(c=>{
      const cx=Math.round(c.x),cy=Math.round(c.y);
      ctx.fillStyle=currentWeather===WEATHER.SUNNY?'#e8d0e0':currentWeather===WEATHER.SNOWING?'#cbd3e3':'#483c54';
      ctx.fillRect(cx,cy+8,c.w,10);ctx.fillRect(cx+8,cy+2,c.w-16,10);ctx.fillRect(cx+16,cy-2,c.w-28,10);
    });
  },
  drawPalmTree(x,y){
    ctx.fillStyle='#8b5a2b';ctx.fillRect(x,y-24,4,26);
    ctx.fillStyle=currentWeather===WEATHER.SNOWING?'#49634d':'#2a7830';
    ctx.fillRect(x-16,y-28,18,4);ctx.fillRect(x+2,y-28,18,4);
    if(currentWeather===WEATHER.SNOWING){
      ctx.fillStyle='#ffffff';ctx.fillRect(x-12,y-30,10,2);ctx.fillRect(x+4,y-30,10,2);
    }
  },
  drawIslands(){
    this.islands.forEach(isl=>{
      const ix=Math.round(isl.x),iy=Math.round(isl.y);
      ctx.fillStyle=currentWeather===WEATHER.SNOWING?'#426e49':'#2a6030';
      ctx.fillRect(ix,iy+isl.h-10,isl.w,10);
      ctx.fillStyle=currentWeather===WEATHER.SNOWING?'#609669':'#3a8040';
      ctx.fillRect(ix+4,iy+isl.h-16,isl.w-8,10);
      ctx.fillStyle=currentWeather===WEATHER.SNOWING?'#e2ecf7':'#c8a870';
      ctx.fillRect(ix,iy+isl.h,isl.w,6);
      this.drawPalmTree(ix+isl.w*0.3|0,iy+isl.h-14);
    });
  },
  drawWater(){
  const wy = H - 90;

  // water base
  ctx.fillStyle = currentWeather === WEATHER.SNOWING ? '#224263' : '#1a3870';
  ctx.fillRect(0, wy, W, 90);

  // wave layers
  const waveSpeed = this.water.x * 0.6;

  for (let i = 0; i < 3; i++) {
    ctx.fillStyle = i === 0 ? '#2a4890' : i === 1 ? '#3a60b0' : '#4a78d0';

    for (let x = -32; x < W + 32; x += 32) {
      const offset = Math.sin((x + waveSpeed * 2 + i * 40) * 0.01) * (2 + i);
      ctx.fillRect(x + (waveSpeed % 32), wy + 10 + i * 8 + offset, 24, 4);
    }
  }

  // boat (NEW FEATURE)
  const boatX = (W * 0.5) + Math.sin(frame * 0.02) * 40;
  const boatY = wy + 18 + Math.sin(frame * 0.05) * 3;

  // hull
  ctx.fillStyle = '#3a1f1f';
  ctx.fillRect(boatX, boatY, 70, 12);

  ctx.fillStyle = '#5a2a2a';
  ctx.fillRect(boatX + 4, boatY - 4, 62, 6);

  // mast
  ctx.fillStyle = '#c9a96e';
  ctx.fillRect(boatX + 35, boatY - 30, 3, 26);

  // sail
  ctx.fillStyle = '#e8e8ff';
  ctx.beginPath();
  ctx.moveTo(boatX + 38, boatY - 28);
  ctx.lineTo(boatX + 38, boatY - 5);
  ctx.lineTo(boatX + 62, boatY - 15);
  ctx.closePath();
  ctx.fill();

  // reflection ripple
  ctx.fillStyle = 'rgba(255,255,255,0.05)';
  ctx.fillRect(boatX, wy + 32, 70, 2);

  // bottom darkness strip
  ctx.fillStyle = '#0a1840';
  ctx.fillRect(0, H - 40, W, 40);
  }
};

const PIPE_W=80,PIPE_GAP=300;
let pipes=[],pipeTimer=0,particles=[],scorePops=[];

function spawnPipe(){
const gapY=120+Math.random()*(H-420);
  const hasCoin=Math.random()<0.6;
  pipes.push({x:W+40,gapTop:gapY,gapBot:gapY+PIPE_GAP,passed:false,
    coin:hasCoin?{x:W+40+PIPE_W/2,y:gapY+PIPE_GAP/2,collected:false,spin:0}:null});
}

function drawPillar(x,y,height,isTop){
  if(height<=0)return;
  ctx.fillStyle=currentWeather===WEATHER.SNOWING?'#2a454e':'#3a5028';
  ctx.fillRect(x,y,PIPE_W,height);
  ctx.fillStyle=currentWeather===WEATHER.SNOWING?'#3b5a66':'#4a6030';
  ctx.fillRect(x+PIPE_W-6,y,6,height);
  const capH=16,capX=x-6,capW=PIPE_W+12;
  const capY=isTop?y+height-capH:y;
  ctx.fillStyle=currentWeather===WEATHER.SNOWING?'#3b5a66':'#4a6030';
  ctx.fillRect(capX,capY,capW,capH);
  if(currentWeather===WEATHER.SNOWING && !isTop){
    ctx.fillStyle='#ffffff';ctx.fillRect(capX,capY,capW,3);
  }
}

function drawCoin(coin) {
  if(coin.collected) return;
  coin.spin = (coin.spin + 0.15) % (Math.PI * 2);
  const scaleX = Math.abs(Math.cos(coin.spin));
  const fullW = 18;
  const w = Math.max(2, Math.round(fullW * scaleX));
  const h = 18;
  const cx = Math.round(coin.x - w / 2);
  const cy = Math.round(coin.y - h / 2);

  px(cx, cy + 2, w, h - 4, '#5e3a00');
  px(cx + 1, cy + 1, Math.max(1, w - 2), h - 2, '#8b6a15');
  px(cx + 2, cy + 2, Math.max(1, w - 4), h - 4, '#c9a96e');
  px(cx + 3, cy + 3, Math.max(1, w - 6), h - 6, '#f0d080');
  
  if (w > 6) {
    px(cx + Math.round(w * 0.4), cy + 5, 2, h - 10, '#8b6a15');
  }
}

function spawnCoinEffect(x,y){
  for(let i=0;i<16;i++){
    const a=(i/16)*Math.PI*2;
    particles.push({x,y,vx:Math.cos(a)*(3+Math.random()*2),vy:Math.sin(a)*(3+Math.random()*2)-2,life:35,maxLife:35,color:'#e8c880',size:3});
  }
}
function spawnDeathEffect(x,y){
  for(let i=0;i<25;i++)particles.push({x,y,vx:(Math.random()-0.5)*10,vy:(Math.random()-0.5)*10-2,life:45,maxLife:45,color:'#e8a0b4',size:4});
}

function spawnSplashEffect(x,y){
  const colors=['#ffffff','#a8d8f0','#c8eeff','#7abcdc','#dff4ff'];
  // upward radial burst
  for(let i=0;i<28;i++){
    const a=Math.PI+Math.random()*Math.PI; // upward arc (180° spread)
    const spd=2+Math.random()*6;
    const col=colors[Math.floor(Math.random()*colors.length)];
    particles.push({
      x:x+(Math.random()-0.5)*20,
      y,
      vx:Math.cos(a)*spd,
      vy:Math.sin(a)*spd,
      life:35+Math.random()*20|0,
      maxLife:55,
      color:col,
      size:Math.random()<0.4?4:2
    });
  }
  // small side droplets
  for(let i=0;i<10;i++){
    const side=i%2===0?1:-1;
    particles.push({
      x:x+side*(10+Math.random()*30),
      y:y+Math.random()*4,
      vx:side*(1+Math.random()*3),
      vy:-(1+Math.random()*3),
      life:20+Math.random()*15|0,
      maxLife:35,
      color:'#c8eeff',
      size:2
    });
  }
}

function updateWeatherSystem() {
  const calculatedWeather = Math.floor(score / 15) % 4;
  if(calculatedWeather !== currentWeather) {
    currentWeather = calculatedWeather;
    triggerWeatherAlert();
  }

  if(currentWeather === WEATHER.RAINY) {
    if(Math.random() < 0.4) weatherParticles.push({x: Math.random()*W, y: -10, vy: 10+Math.random()*5, vx: -2, type: 'rain', size: 2});
  } else if(currentWeather === WEATHER.THUNDERSTORM) {
    if(Math.random() < 0.7) weatherParticles.push({x: Math.random()*W, y: -10, vy: 14+Math.random()*6, vx: -3, type: 'rain', size: 2});
    if(lightningFlash > 0) lightningFlash--;
    if(Math.random() < 0.006 && lightningFlash === 0) lightningFlash = 5 + Math.floor(Math.random()*6);
  } else if(currentWeather === WEATHER.SNOWING) {
    if(Math.random() < 0.2) weatherParticles.push({x: Math.random()*W, y: -10, vy: 1.5+Math.random()*2, vx: -1 + Math.random()*2, type: 'snow', size: 2+Math.random()*3|0, swing: Math.random()*10});
  }

  weatherParticles.forEach(p => {
    p.y += p.vy;
    if(p.type === 'snow') {
      p.swing += 0.03;
      p.x += p.vx + Math.sin(p.swing)*0.5;
    } else {
      p.x += p.vx;
    }
  });
  weatherParticles = weatherParticles.filter(p => p.y < H && p.x > 0 && p.x < W);
}

function drawWeatherSystem() {
  weatherParticles.forEach(p => {
    if(p.type === 'rain') {
      ctx.fillStyle = currentWeather === WEATHER.THUNDERSTORM ? 'rgba(130,160,220,0.45)' : 'rgba(150,180,220,0.35)';
      ctx.fillRect(Math.round(p.x), Math.round(p.y), p.size, 12);
    } else if(p.type === 'snow') {
      ctx.fillStyle = 'rgba(255,255,255,0.75)';
      ctx.fillRect(Math.round(p.x), Math.round(p.y), p.size, p.size);
    }
  });
}

function triggerWeatherAlert() {
  const alertDiv = document.getElementById('weatherAlert');
  const titles = ["FORECAST: SUNNY", "FORECAST: RAINY", "FORECAST: THUNDERSTORM", "FORECAST: BLIZZARD"];
  alertDiv.textContent = titles[currentWeather];
  alertDiv.style.display = 'block';
  setTimeout(() => { alertDiv.style.display = 'none'; }, 3000);
}

function checkCollision(pipe){
  const bx=BIRD.x+14,by=BIRD.y+14,bw=BIRD.width-28,bh=BIRD.height-26;
  if(bx+bw>pipe.x&&bx<pipe.x+PIPE_W&&(by<pipe.gapTop||by+bh>pipe.gapBot))return true;
  return false;
}

function checkCoin(coin){
  if(!coin||coin.collected)return false;
  const dx=BIRD.x+BIRD.width/2-coin.x,dy=BIRD.y+BIRD.height/2-coin.y;
  return Math.sqrt(dx*dx+dy*dy)<34;
}

// --- CALMED DOWN VELOCITY PROFILE ---
function getSpeed(){return Math.min(2.2 + score * 0.02, 4.2);}
function getInterval(){return Math.max(85, 160 - score * 1.2);}

// --- MILESTONE SYSTEM ---
const MILESTONES = [10, 25, 50, 100, 150, 200];
let milestoneFlash = 0;        // screen flash alpha (0-1)
let screenShake = 0;           // shake frames remaining
let milestonePops = [];        // big canvas text pops

function checkMilestone(newScore){
  if(!MILESTONES.includes(newScore)) return;
  milestoneFlash = 1.0;
  screenShake = 18;
  const labels = {10:'NICE!',25:'GREAT!',50:'ON FIRE!',100:'BEAST MODE!',150:'LEGENDARY!',200:'GODLIKE!'};
  milestonePops.push({
    text: labels[newScore] || newScore+'!',
    sub: newScore + ' POINTS',
    x: W/2, y: H*0.35,
    life: 90, maxLife: 90,
    scale: 0
  });
  AudioEngine.playMilestone();
}

// Add milestone sound to AudioEngine
AudioEngine.playMilestone = function(){
  this.init();
  const t = this.ctx.currentTime;
  const freqs = [523.25, 659.25, 783.99, 1046.5];
  freqs.forEach((f, i) => {
    const osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(f, t + i * 0.07);
    gain.gain.setValueAtTime(0.12, t + i * 0.07);
    gain.gain.linearRampToValueAtTime(0.001, t + i * 0.07 + 0.15);
    osc.connect(gain); gain.connect(this.ctx.destination);
    osc.start(t + i * 0.07); osc.stop(t + i * 0.07 + 0.15);
  });
};

async function startGame(){
  if(!playerName){ await promptPlayerName(); }
  AudioEngine.init();
  gameOverShown=false;
  state=STATE.PLAYING;score=0;pipes=[];pipeTimer=30;particles=[];scorePops=[];weatherParticles=[];milestonePops=[];milestoneFlash=0;screenShake=0;currentWeather=WEATHER.SUNNY;
  BIRD.reset();BG.init();
  document.getElementById('startScreen').classList.remove('active');
  document.getElementById('gameoverScreen').classList.remove('active');
  document.getElementById('liveScore').style.display='block';
  document.getElementById('statusHint').textContent = "SPACE TO RETRY";
  updateHUD();
  AudioEngine.startMusic();
}

function die(){
  if(BIRD.dead)return;
  BIRD.dead=true;state=STATE.DEAD;
  AudioEngine.playHit();
  AudioEngine.stopMusic();

  const waterY = H - 50; // matches BG.drawWater()
  const hitGroundOrWater = BIRD.y + BIRD.height >= waterY;

  if(hitGroundOrWater){
    // Snap bird to water surface and freeze
    BIRD.y = waterY - BIRD.height + 10;
    BIRD.vy = 0;
    BIRD.hitWater = true;
    BIRD.angle = 0.3; // slight tilt on impact
    spawnSplashEffect(BIRD.x + BIRD.width / 2, waterY);
    // Slight delay before game over for splash to play out
    if(score>hiScore){hiScore=score;localStorage.setItem('beaks_flap_hi',hiScore);}
    setTimeout(showGameOver, 900);
  } else {
    // Pipe hit — original behavior
    spawnDeathEffect(BIRD.x+BIRD.width/2,BIRD.y+BIRD.height/2);
    if(score>hiScore){hiScore=score;localStorage.setItem('beaks_flap_hi',hiScore);}
    setTimeout(showGameOver,1200);
  }
}

let gameOverShown = false;
async function showGameOver(){
  if(gameOverShown)return;
  gameOverShown=true;
  document.getElementById('liveScore').style.display='none';
  document.getElementById('gameoverScreen').classList.add('active');
  document.getElementById('goScore').innerHTML='SCORE: '+score+'<br/>BEST: '+hiScore;
  document.getElementById('newRecord').style.display=(score>=hiScore&&score>0)?'block':'none';
  // submit score then load leaderboard
  document.getElementById('lbBody').innerHTML='<div class="lb-loading">SAVING...</div>';
  try {
    if(score > 0) await submitScore(playerName, score);
    const rows = await fetchLeaderboard();
    if(!Array.isArray(rows)||rows.length===0){
      document.getElementById('lbBody').innerHTML='<div class="lb-loading">NO SCORES YET</div>';
      return;
    }
    let html='';
    rows.forEach((r,i)=>{
      const isMe = r.name===playerName && r.score===score;
      html+=`<div class="lb-row${isMe?' me':''}">
        <span class="lb-rank">#${i+1}</span>
        <span class="lb-name">${r.name.replace(/</g,'&lt;')}</span>
        <span class="lb-score">${r.score}</span>
      </div>`;
    });
    document.getElementById('lbBody').innerHTML=html;
    // scroll to player's row
    const meEl = document.querySelector('.lb-row.me');
    if(meEl) meEl.scrollIntoView({block:'center'});
  } catch(e){
    document.getElementById('lbBody').innerHTML=`<div class="lb-loading">ERROR: ${e.message.slice(0,80)}</div>`;
  }
}

function updateHUD(){
  document.getElementById('hudScore').textContent=score;
  document.getElementById('hudHi').textContent='BEST: '+hiScore;
}

function flap(){
  if(state===STATE.START){startGame();return;}
  if(state===STATE.DEAD)return;
  BIRD.flap();
}

document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();flap();}});
canvas.addEventListener('click',()=>flap());
canvas.addEventListener('touchstart',e=>{e.preventDefault();flap();},{passive:false});
document.getElementById('startBtn').addEventListener('click',startGame);
document.getElementById('retryBtn').addEventListener('click',startGame);
document.addEventListener('keydown',e=>{if(e.code==='Space'&&state===STATE.DEAD)startGame();});
document.getElementById('startHiScore').textContent='HI-SCORE: '+hiScore;

function drawFloor(){
  ctx.fillStyle='#0a1840';ctx.fillRect(0,H-40,W,40);
  ctx.fillStyle='#1a2848';ctx.fillRect(0,H-42,W,4);
  for(let tx=0;tx<W+32;tx+=32)ctx.fillRect(tx,H-36,30,34);
}

// --- SOCIAL SHARE SYSTEM ---
document.getElementById('xShareBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  const text = encodeURIComponent(`🔥 Just scored ${score} on Flappy Birds! 🎮\n\nCreated by @ABDXBT for @thebeaksart\n\nCan you beat my record? 👇`);
  window.open("https://twitter.com/intent/tweet?text=" + text, '_blank');
});

document.getElementById('xCopyBtn').addEventListener('click', async (e) => {
  e.stopPropagation();
  const hint = document.getElementById('statusHint');
  hint.textContent = "GENERATING CARD...";
  try {
    const card = document.createElement('canvas'); card.width = 600; card.height = 315;
    const cctx = card.getContext('2d'); cctx.imageSmoothingEnabled = false;
    cctx.fillStyle = '#0a0010'; cctx.fillRect(0,0,600,315);
    cctx.strokeStyle = '#e8a0b4'; cctx.lineWidth = 4; cctx.strokeRect(6,6,588,303);
    cctx.fillStyle = '#e8a0b4'; cctx.font = '24px "Press Start 2P",monospace'; cctx.fillText('FLAPPY BIRDS', 50, 75);
    cctx.fillStyle = '#9b8ec4'; cctx.font = '10px "Press Start 2P",monospace'; cctx.fillText('CREATED BY @ABDXBT FOR @THEBEAKSART', 50, 110);
    cctx.fillStyle = '#fff'; cctx.font = '16px "Press Start 2P",monospace'; cctx.fillText(`FINAL SCORE: ${score}`, 50, 185);
    cctx.fillStyle = '#c9a96e'; cctx.fillText(`PERSONAL BEST: ${hiScore}`, 50, 225);
    card.toBlob(async (blob) => {
      await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
      hint.textContent = "COPIED! PASTE ON 𝕏";
    });
  } catch (err) { hint.textContent = "CLIPBOARD ERROR"; }
});

function loop(){
  requestAnimationFrame(loop);
  frame++;
  const speed=state===STATE.PLAYING?getSpeed():state===STATE.DEAD?0.5:0;

  if(state===STATE.PLAYING||state===STATE.DEAD){
    BIRD.update();
    if(state===STATE.PLAYING){
      updateWeatherSystem();
      pipeTimer--;
      if(pipeTimer<=0){spawnPipe();pipeTimer=getInterval();}
      pipes.forEach(p=>{
        p.x-=speed;if(p.coin)p.coin.x-=speed;
        if(!p.passed&&p.x+PIPE_W<BIRD.x){
          p.passed=true;score++;
          AudioEngine.playScore();
          checkMilestone(score);
          scorePops.push({x:BIRD.x+20,y:BIRD.y-10,text:'+1',color:'#6ec4b0',life:45,maxLife:45});
          updateHUD();
        }
        if(p.coin&&checkCoin(p.coin)){
          p.coin.collected=true;score+=5;
          AudioEngine.playCoin();
          spawnCoinEffect(p.coin.x,p.coin.y);
          scorePops.push({x:p.coin.x,y:p.coin.y-10,text:'+5',color:'#c9a96e',life:45,maxLife:45});
          updateHUD();
        }
        if(checkCollision(p))die();
      });
      pipes=pipes.filter(p=>p.x+PIPE_W+40>0);
      // standalone ground/ceiling check (fires even with no pipes onscreen)
      if(BIRD.y+BIRD.height>H-50||BIRD.y<-50)die();
    }
    BG.update(speed);
  }

  const shakeX = screenShake>0?(Math.random()-0.5)*5|0:0;
  ctx.save();
  ctx.translate(shakeX,0);
  BG.drawSky();BG.drawStars();BG.drawSun();BG.drawClouds();BG.drawWater();
  pipes.forEach(p=>{
    drawPillar(p.x,0,p.gapTop,true);
    drawPillar(p.x,p.gapBot,H-p.gapBot-40,false);
    if(p.coin)drawCoin(p.coin);
  });
  BIRD.draw();
  drawWeatherSystem();
  ctx.restore();
  drawFloor();

  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life--;ctx.globalAlpha=p.life/p.maxLife;ctx.fillStyle=p.color;ctx.fillRect(Math.round(p.x),Math.round(p.y),p.size,p.size);});
  ctx.globalAlpha=1;

  scorePops=scorePops.filter(p=>p.life>0);
  scorePops.forEach(p=>{p.y-=0.8;p.life--;ctx.globalAlpha=p.life/p.maxLife;ctx.fillStyle=p.color;ctx.font='bold 10px "Press Start 2P",monospace';ctx.fillText(p.text,Math.round(p.x),Math.round(p.y));});
  ctx.globalAlpha=1;

  // --- MILESTONE EFFECTS ---
  if(milestoneFlash>0){
    ctx.globalAlpha=milestoneFlash*0.25;
    ctx.fillStyle='#e8a0b4';
    ctx.fillRect(0,0,W,H);
    ctx.globalAlpha=1;
    milestoneFlash=Math.max(0,milestoneFlash-0.06);
  }
  if(screenShake>0) screenShake--;

  milestonePops=milestonePops.filter(p=>p.life>0);
  milestonePops.forEach(p=>{
    p.life--;
    const t=p.life/p.maxLife;
    // scale in fast, hold, then fade out
    p.scale=p.life>70?1-(p.life-70)/20*0:Math.min(1,(p.maxLife-p.life)/10);
    const alpha=t<0.25?t*4:1;
    ctx.save();
    ctx.globalAlpha=alpha;
    ctx.translate(Math.round(p.x),Math.round(p.y));
    const sc=0.5+p.scale*0.5;
    ctx.scale(sc,sc);
    // shadow
    ctx.fillStyle='#3a0028';
    ctx.font='bold 22px "Press Start 2P",monospace';
    ctx.textAlign='center';
    ctx.fillText(p.text,3,3);
    // main text
    ctx.fillStyle='#e8a0b4';
    ctx.fillText(p.text,0,0);
    // sub text
    ctx.font='10px "Press Start 2P",monospace';
    ctx.fillStyle='#c9a96e';
    ctx.fillText(p.sub,0,24);
    ctx.textAlign='left';
    ctx.restore();
  });

  if(state===STATE.START){BIRD.y=(H*0.4)+Math.sin(frame*0.06)*12;BIRD.angle=Math.sin(frame*0.04)*0.12;BIRD.draw();}

  ctx.globalAlpha=0.04;ctx.fillStyle='#000';
  for(let sy=0;sy<H;sy+=2)ctx.fillRect(0,sy,W,1);
  ctx.globalAlpha=1;
}

BG.init();
requestAnimationFrame(loop);
</script>
